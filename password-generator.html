<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator · Toolvra</title>
  <meta name="description" content="Generate strong, customisable passwords with length, character sets, strength indicator and copy.">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f0f5fa 0%, #e6edf4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* main card – consistent with other tools */
    .tool-card {
      max-width: 800px;
      width: 100%;
      background: #ffffff;
      border-radius: 3rem;
      padding: 2.5rem 2.5rem;
      box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25), 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.7);
    }

    /* back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e9eff7;
      color: #1e3c5a;
      text-decoration: none;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid #cbd6e4;
      margin-bottom: 1.8rem;
      transition: 0.15s;
    }
    .back-link:hover {
      background: #dce6f2;
      border-color: #a0b9d6;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(150deg, #1e2f4b, #2b4b7a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* length control */
    .length-group {
      margin-bottom: 2rem;
    }
    .length-label {
      display: flex;
      justify-content: space-between;
      font-weight: 500;
      color: #1e3c5a;
      margin-bottom: 0.5rem;
    }
    .length-row {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .length-row input[type="range"] {
      flex: 1;
      height: 8px;
      background: #dde5ef;
      border-radius: 20px;
      -webkit-appearance: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: #2b4b7a;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      border: 2px solid white;
    }
    .length-row input[type="number"] {
      width: 80px;
      text-align: center;
      padding: 0.6rem;
      background: #f9fcff;
      border: 1.5px solid #dde5ef;
      border-radius: 2rem;
      font-size: 1rem;
      color: #152b44;
    }

    /* checkboxes grid */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .option-item {
      background: #f9fcff;
      border: 1px solid #dde5ef;
      border-radius: 2rem;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .option-item:hover {
      border-color: #a0b9d6;
      background: #ffffff;
    }
    .option-item input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #2b4b7a;
      cursor: pointer;
    }
    .option-item label {
      font-weight: 500;
      color: #1e3c5a;
      cursor: pointer;
      flex: 1;
    }

    /* strength meter */
    .strength-meter {
      background: #e9eff7;
      border-radius: 2rem;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #cbd6e4;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .strength-text {
      font-weight: 600;
      color: #1e3c5a;
    }
    .strength-bar {
      width: 200px;
      height: 10px;
      background: #d0ddee;
      border-radius: 10px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      background: #dc3545;
      transition: width 0.2s, background 0.2s;
    }

    /* password display */
    .password-area {
      background: #f9fcff;
      border-radius: 2rem;
      padding: 1.2rem 1.5rem;
      border: 1px solid #dde5ef;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      word-break: break-all;
    }
    #password {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1.3rem;
      color: #152b44;
    }
    .copy-feedback {
      background: #1f5e4f;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.85rem;
      opacity: 0;
      transition: 0.15s;
      white-space: nowrap;
    }
    .copy-feedback.show { opacity: 1; }

    /* buttons */
    .button-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 2rem 0 1.5rem;
    }
    .btn {
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 3rem;
      font-size: 1.1rem;
      font-weight: 500;
      background: #1e3a5f;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: 1px solid #3f6190;
      transition: 0.15s;
      box-shadow: 0 4px 8px rgba(0,30,60,0.1);
    }
    .btn:hover {
      background: #244c7a;
      gap: 12px;
      border-color: #6a93cf;
    }
    .btn-success {
      background: #1f5e4f;
      border-color: #2f8b76;
    }
    .btn-success:hover {
      background: #287a68;
    }

    .footer-note {
      margin-top: 2.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid #d0ddee;
      text-align: center;
      color: #5f738e;
      font-size: 0.9rem;
    }

    @media (max-width: 550px) {
      .tool-card { padding: 1.8rem; }
      h1 { font-size: 2.2rem; }
      .strength-meter { flex-direction: column; align-items: start; gap: 0.8rem; }
      .strength-bar { width: 100%; }
    }
  </style>
</head>
<body>
<div class="tool-card">
  <!-- back link to hub -->
  <a href="index.html" class="back-link">← Back to Toolvra</a>

  <h1>🔐 Password Generator</h1>

  <!-- length control -->
  <div class="length-group">
    <div class="length-label">
      <span>Password length</span>
      <span id="lengthValue">12</span>
    </div>
    <div class="length-row">
      <input type="range" id="lengthSlider" min="4" max="64" value="12">
      <input type="number" id="lengthNumber" min="4" max="64" value="12">
    </div>
  </div>

  <!-- character options -->
  <div class="options-grid">
    <div class="option-item">
      <input type="checkbox" id="uppercase" checked>
      <label for="uppercase">Uppercase (A-Z)</label>
    </div>
    <div class="option-item">
      <input type="checkbox" id="lowercase" checked>
      <label for="lowercase">Lowercase (a-z)</label>
    </div>
    <div class="option-item">
      <input type="checkbox" id="numbers" checked>
      <label for="numbers">Numbers (0-9)</label>
    </div>
    <div class="option-item">
      <input type="checkbox" id="symbols">
      <label for="symbols">Symbols (!@#$%...)</label>
    </div>
    <div class="option-item">
      <input type="checkbox" id="excludeAmbiguous">
      <label for="excludeAmbiguous">Exclude ambiguous (il1o0)</label>
    </div>
  </div>

  <!-- strength meter -->
  <div class="strength-meter">
    <span class="strength-text" id="strengthLabel">Strength: Medium</span>
    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill" style="width: 50%; background: #ffc107;"></div>
    </div>
  </div>

  <!-- generated password -->
  <div class="password-area">
    <span id="password">P@ssw0rd123</span>
    <span class="copy-feedback" id="copyFeedback">Copied!</span>
  </div>

  <!-- buttons -->
  <div class="button-panel">
    <button class="btn" id="generateBtn"><span>⚡</span> Generate</button>
    <button class="btn btn-success" id="copyBtn"><span>📋</span> Copy Password</button>
  </div>

  <!-- footer -->
  <div class="footer-note">Toolvra · free online utilities</div>
</div>

<script>
  (function() {
    // DOM elements
    const lengthSlider = document.getElementById('lengthSlider');
    const lengthNumber = document.getElementById('lengthNumber');
    const lengthValue = document.getElementById('lengthValue');
    const uppercaseChk = document.getElementById('uppercase');
    const lowercaseChk = document.getElementById('lowercase');
    const numbersChk = document.getElementById('numbers');
    const symbolsChk = document.getElementById('symbols');
    const excludeAmbiguousChk = document.getElementById('excludeAmbiguous');
    const passwordSpan = document.getElementById('password');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const copyFeedback = document.getElementById('copyFeedback');
    const strengthLabel = document.getElementById('strengthLabel');
    const strengthFill = document.getElementById('strengthFill');

    // sync slider + number
    function syncLength() {
      lengthNumber.value = lengthSlider.value;
      lengthValue.innerText = lengthSlider.value;
      updateStrength();
    }
    lengthSlider.addEventListener('input', syncLength);
    lengthNumber.addEventListener('input', () => {
      let val = parseInt(lengthNumber.value, 10);
      if (isNaN(val) || val < 4) lengthNumber.value = 4;
      if (val > 64) lengthNumber.value = 64;
      lengthSlider.value = lengthNumber.value;
      lengthValue.innerText = lengthNumber.value;
      updateStrength();
    });

    // character sets
    const upperSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lowerSet = 'abcdefghijklmnopqrstuvwxyz';
    const numberSet = '0123456789';
    const symbolSet = '!@#$%^&*()_+{}[]<>?~';
    // ambiguous characters to exclude (if option checked)
    const ambiguous = 'il1o0ILO'; // includes I, l, 1, O, 0

    // generate password based on current settings
    function generatePassword() {
      let chars = '';
      if (uppercaseChk.checked) chars += upperSet;
      if (lowercaseChk.checked) chars += lowerSet;
      if (numbersChk.checked) chars += numberSet;
      if (symbolsChk.checked) chars += symbolSet;

      // if no set selected, default to all (but at least one should be checked; we'll force lowercase)
      if (chars === '') {
        chars = lowerSet;
        lowercaseChk.checked = true;
      }

      // remove ambiguous characters if requested
      if (excludeAmbiguousChk.checked) {
        chars = chars.split('').filter(c => !ambiguous.includes(c)).join('');
        // if filtering empties chars (rare), fallback to original without exclusion
        if (chars.length === 0) {
          chars = (uppercaseChk.checked ? upperSet : '') +
                  (lowercaseChk.checked ? lowerSet : '') +
                  (numbersChk.checked ? numberSet : '') +
                  (symbolsChk.checked ? symbolSet : '');
        }
      }

      const len = parseInt(lengthNumber.value, 10);
      let password = '';
      for (let i = 0; i < len; i++) {
        const randomIndex = Math.floor(Math.random() * chars.length);
        password += chars[randomIndex];
      }
      return password;
    }

    // update password display and strength
    function updatePassword() {
      const pwd = generatePassword();
      passwordSpan.innerText = pwd;
      updateStrength();
    }

    // strength calculation
    function calculateStrength() {
      const len = parseInt(lengthNumber.value, 10);
      let sets = 0;
      if (uppercaseChk.checked) sets++;
      if (lowercaseChk.checked) sets++;
      if (numbersChk.checked) sets++;
      if (symbolsChk.checked) sets++;
      // base entropy estimation
      let poolSize = 0;
      if (uppercaseChk.checked) poolSize += 26;
      if (lowercaseChk.checked) poolSize += 26;
      if (numbersChk.checked) poolSize += 10;
      if (symbolsChk.checked) poolSize += symbolSet.length;
      if (excludeAmbiguousChk.checked) {
        // rough reduction: remove ambiguous from pool (count approx)
        if (uppercaseChk.checked) poolSize -= 3; // I, L, O (approx)
        if (lowercaseChk.checked) poolSize -= 4; // i, l, o, maybe? We'll just subtract 4
        if (numbersChk.checked) poolSize -= 2; // 0,1
        // symbols might have ambiguous? we ignore for simplicity
      }
      if (poolSize < 2) poolSize = 2; // just in case

      // rough entropy bits = log2(poolSize^len) = len * log2(poolSize)
      // we use categories
      if (len < 8) return { label: 'Very Weak', width: 20, color: '#dc3545' };
      if (len < 10) {
        if (sets === 1) return { label: 'Weak', width: 40, color: '#ffc107' };
        else return { label: 'Medium', width: 60, color: '#fd7e14' };
      } else if (len < 12) {
        if (sets <= 2) return { label: 'Medium', width: 60, color: '#fd7e14' };
        else return { label: 'Strong', width: 80, color: '#28a745' };
      } else {
        if (sets <= 2) return { label: 'Strong', width: 80, color: '#28a745' };
        else return { label: 'Very Strong', width: 100, color: '#1e7e34' };
      }
    }

    function updateStrength() {
      const strength = calculateStrength();
      strengthLabel.innerText = `Strength: ${strength.label}`;
      strengthFill.style.width = strength.width + '%';
      strengthFill.style.background = strength.color;
    }

    // generate on load
    updatePassword();

    // generate button
    generateBtn.addEventListener('click', updatePassword);

    // copy button
    copyBtn.addEventListener('click', () => {
      const pwd = passwordSpan.innerText;
      if (!pwd) return;
      navigator.clipboard.writeText(pwd).then(() => {
        copyFeedback.classList.add('show');
        setTimeout(() => copyFeedback.classList.remove('show'), 1200);
      }).catch(() => alert('Press Ctrl+C to copy'));
    });

    // any checkbox change -> update password (optional) but better to let user click generate. But we can auto-update for convenience? We'll auto-update to keep fresh.
    const checkboxes = [uppercaseChk, lowercaseChk, numbersChk, symbolsChk, excludeAmbiguousChk];
    checkboxes.forEach(cb => cb.addEventListener('change', () => {
      updatePassword(); // auto generate new password when options change
    }));

    // also length change auto-generate? We'll auto-generate on length change too for live feel.
    lengthSlider.addEventListener('input', () => {
      // sync already called, then update password
      updatePassword();
    });
    lengthNumber.addEventListener('input', () => {
      // sync already called, then update password
      updatePassword();
    });
  })();
</script>
